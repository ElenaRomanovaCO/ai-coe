version: 1
# Monorepo: the Next.js app lives in web/. Amplify locates it via the
# AMPLIFY_MONOREPO_APP_ROOT=web branch env var and runs these phases from there
# (so baseDirectory .next resolves to web/.next). Keep this spec flat — pairing
# the `applications:`/appRoot wrapper with the env var doubles the path.
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
