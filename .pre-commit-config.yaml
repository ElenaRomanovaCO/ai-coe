# Pre-commit hooks. Install once with: uv run pre-commit install
# (or: pipx run pre-commit install). Runs the vault frontmatter validator and
# ruff on every commit so malformed content never lands.
repos:
  - repo: local
    hooks:
      - id: validate-vault
        name: Validate vault frontmatter
        entry: uv run python scripts/validate_vault.py
        language: system
        files: ^vault/
        pass_filenames: false
      - id: ruff
        name: ruff (lint)
        entry: uv run ruff check
        language: system
        types: [python]
        require_serial: true
