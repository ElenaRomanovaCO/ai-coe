name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (lint + test + synth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync agents deps
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check agents infra

      - name: Pytest
        run: uv run pytest agents -q

      - name: Setup Node (for CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync infra deps
        working-directory: infra
        run: uv sync

      - name: CDK synth
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
        run: npx --yes aws-cdk@latest synth --quiet

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
        env:
          APP_PASSWORD: ci-placeholder
