version: 1
# Monorepo: the Next.js app lives in web/. Amplify requires BOTH the
# applications/appRoot wrapper here AND the app-level env var
# AMPLIFY_MONOREPO_APP_ROOT=web (set on the Amplify app) — together, not as
# alternatives. appRoot and the env var must match.
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - pnpm install --frozen-lockfile
        build:
          commands:
            # Amplify console/branch env vars are available at BUILD time but not
            # to the Next.js SSR runtime. Write the server-side ones into
            # .env.production so Next bundles them into the compute output.
            - env | grep -e '^APP_PASSWORD=' -e '^AICOE_ORCHESTRATOR_FN=' >> .env.production || true
            - pnpm build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
