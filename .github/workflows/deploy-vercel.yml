name: Deploy (Vercel)

# Frontend production deploy on merges to main. Preview deploys are handled by
# Vercel's native Git integration on PRs.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-vercel.yml"

permissions:
  contents: read

concurrency:
  group: deploy-vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull Vercel environment
        run: npx --yes vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npx --yes vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: npx --yes vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
